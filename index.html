<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Message</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Quicksand:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    .fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: sparkle 2.5s ease-in-out infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full m-0 p-0">
  <div id="app" class="h-full w-full flex items-center justify-center overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   <!-- Sparkles -->
   <div class="sparkle" style="top:10%;left:15%;background:#e2b714;animation-delay:0s;"></div>
   <div class="sparkle" style="top:20%;right:20%;background:#f8c291;animation-delay:0.8s;"></div>
   <div class="sparkle" style="bottom:25%;left:25%;background:#e2b714;animation-delay:1.5s;"></div>
   <div class="sparkle" style="top:40%;right:10%;background:#f8c291;animation-delay:0.4s;"></div>
   <div class="sparkle" style="bottom:15%;right:30%;background:#e2b714;animation-delay:1.2s;"></div>
   <div class="sparkle" style="top:60%;left:8%;background:#f8c291;animation-delay:2s;"></div>
   <div class="text-center px-6 py-10 max-w-2xl w-full">
    <!-- Decorative line -->
    <div class="fade-up flex items-center justify-center gap-4 mb-8">
     <div style="width:60px;height:1px;background:#e2b714;"></div>
     <div style="width:8px;height:8px;background:#e2b714;transform:rotate(45deg);"></div>
     <div style="width:60px;height:1px;background:#e2b714;"></div>
    </div>
    <h1 id="mainMsg" class="fade-up delay-1" style="font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:#f0e6d3;line-height:1.3;margin-bottom:20px;">Hi chichim. You're amazing and you should always remember that ✨</h1>
    <p id="subMsg" class="fade-up delay-2" style="font-family:'Quicksand',sans-serif;font-size:18px;color:#a8b2c1;line-height:1.6;margin-bottom:40px;">This message was made just for you</p>
    <div class="fade-up delay-3 flex items-center justify-center gap-3">
     <div style="width:40px;height:1px;background:#e2b714;"></div>
     <p id="senderMsg" style="font-family:'Quicksand',sans-serif;font-size:15px;color:#e2b714;font-weight:600;">— With love</p>
     <div style="width:40px;height:1px;background:#e2b714;"></div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_message: "Hi, Chichim.\nYou're amazing and you should always remember that",
      sub_message: "This message was made just for you",
      sender_name: "With love",
      background_color: "#1a1a2e",
      accent_color: "#e2b714",
      text_color: "#f0e6d3",
      subtitle_color: "#a8b2c1",
      font_family: "Playfair Display",
      font_size: 42
    };

    const mainEl = document.getElementById('mainMsg');
    const subEl = document.getElementById('subMsg');
    const senderEl = document.getElementById('senderMsg');
    const appEl = document.getElementById('app');

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };

      mainEl.textContent = c.main_message;
      subEl.textContent = c.sub_message;
      senderEl.textContent = c.sender_name ? `— ${c.sender_name}` : '';

      appEl.style.background = `linear-gradient(135deg, ${c.background_color} 0%, #16213e 50%, #0f3460 100%)`;
      mainEl.style.color = c.text_color;
      mainEl.style.fontFamily = `${c.font_family}, Playfair Display, serif`;
      mainEl.style.fontSize = `${c.font_size}px`;
      subEl.style.color = c.subtitle_color;
      subEl.style.fontFamily = `Quicksand, sans-serif`;
      subEl.style.fontSize = `${c.font_size * 0.43}px`;
      senderEl.style.color = c.accent_color;
      senderEl.style.fontSize = `${c.font_size * 0.36}px`;

      document.querySelectorAll('.sparkle').forEach(s => s.style.background = c.accent_color);
      document.querySelectorAll('[style*="background:#e2b714"]').forEach(el => {
        if (!el.classList.contains('sparkle')) el.style.background = c.accent_color;
      });
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.subtitle_color || defaultConfig.subtitle_color, set: (v) => { config.subtitle_color = v; window.elementSdk.setConfig({ subtitle_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
      }),
      mapToEditPanelValues: (config) => new Map([
        ["main_message", config.main_message || defaultConfig.main_message],
        ["sub_message", config.sub_message || defaultConfig.sub_message],
        ["sender_name", config.sender_name || defaultConfig.sender_name],
      ])
    });
  </script>

</html>
